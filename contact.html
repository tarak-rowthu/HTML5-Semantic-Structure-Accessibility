<body>
<header class="site-header" role="banner">
  <nav class="primary-nav" aria-label="Main navigation">
    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="Toggle navigation" />
    <label for="nav-toggle" class="nav-toggle-label" aria-hidden="true">
      <svg width="24" height="24" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </label>
    <ul>
      <li><a href="index.html" class="nav-link">Home</a></li>
      <li><a href="projects.html" class="nav-link">Projects</a></li>
      <li><a href="contact.html" class="nav-link" aria-current="page">Contact</a></li>
    </ul>
  </nav>
</header>

<main>
  <section class="hero" aria-label="Contact Hero">
    <h1 class="js-name"></h1>
    <p class="js-role"></p>
    <p class="tagline">Feel free to drop me a line – I’ll get back to you promptly.</p>
  </section>

  <section aria-labelledby="contact-heading">
    <h2 id="contact-heading">Contact Me</h2>
    <form id="contact-form" novalidate>
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" required />
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>
      <button type="submit" class="cta-button">Send Message</button>
    </form>
  </section>
</main>

<footer class="site-footer" role="contentinfo">
  <p>&copy; 2026 Tarak Rowthu. All rights reserved.</p>
  <nav aria-label="Footer navigation">
    <div class="footer-social"></div>
